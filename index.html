<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const { createClient } = supabase;
const client = createClient(
  "https://ldnjnhhntdoeyyxygnlc.supabase.co",
  "DEIN_KEY_HIER"
);
</script>

<style>
body{font-family:Arial;background:#eef7ff;margin:0}
.app{display:flex}
.sidebar{width:220px;background:white;padding:20px}
.content{flex:1;padding:20px}

.btn{padding:10px;border:none;border-radius:10px;cursor:pointer}
.btn-primary{background:#2563eb;color:white}
.btn-success{background:#20b486;color:white}

.bell{position:relative;margin-left:10px;cursor:pointer}
.badge{
  position:absolute;
  top:-5px;right:-5px;
  background:red;color:white;
  border-radius:50%;
  padding:3px 6px;
  font-size:12px;
}

.panel{
  position:absolute;
  top:40px;right:0;
  background:white;
  width:320px;
  border-radius:10px;
  box-shadow:0 10px 30px rgba(0,0,0,0.2);
  display:none;
  padding:10px;
}

.panel.open{display:block}

.notification{
  padding:10px;
  border-bottom:1px solid #ddd;
  cursor:pointer;
}

.notification.unread{background:#fff7ed}
</style>
</head>

<body>

<div class="app">

<div class="sidebar">
<b>Menu</b><br><br>
<button onclick="showPage('dashboard')">Dashboard</button><br><br>
<button onclick="showPage('orders')">Aufträge</button>
</div>

<div class="content">

<div style="display:flex;justify-content:space-between;align-items:center">
  <h2>Hertz Portal</h2>

  <div style="position:relative">

    <div class="bell" onclick="toggleNotifications()">
      🔔
      <div id="badge" class="badge" style="display:none"></div>
    </div>

    <div id="panel" class="panel">
      <b>Benachrichtigungen</b>
      <div id="notifications"></div>
    </div>

  </div>
</div>

<div id="page-dashboard">Dashboard</div>
<div id="page-orders" style="display:none"></div>

</div>
</div>

<script>
let state={
orders:[],
notifications:[]
}

function showPage(p){
document.querySelectorAll('[id^="page-"]').forEach(x=>x.style.display="none")
document.getElementById("page-"+p).style.display="block"
}

async function loadOrders(){
const {data}=await client.from("orders").select("*")
state.orders=data||[]
renderOrders()
}

async function loadNotifications(){
const name=localStorage.getItem("chatName")
if(!name) return

const {data}=await client
.from("notifications")
.select("*")
.eq("recipient_name",name)
.order("created_at",{ascending:false})

state.notifications=data||[]
renderNotifications()
}

function renderNotifications(){
const list=document.getElementById("notifications")
const badge=document.getElementById("badge")

const unread=state.notifications.filter(n=>!n.is_read).length

badge.style.display=unread?"block":"none"
badge.innerText=unread

list.innerHTML=state.notifications.map(n=>`
<div class="notification ${n.is_read?'':'unread'}"
onclick="openFromNotification('${n.order_id}','${n.id}')">
<b>${n.title}</b><br>
${n.body}
</div>
`).join("")
}

async function openFromNotification(orderId,notificationId){

// 👉 Notification auf gelesen setzen
await client.from("notifications")
.update({is_read:true})
.eq("id",notificationId)

// 👉 Orders laden falls nötig
await loadOrders()

// 👉 Seite wechseln
showPage("orders")

// 👉 Scroll zum Auftrag
setTimeout(()=>{
const el=document.getElementById("order-"+orderId)
if(el){
el.scrollIntoView({behavior:"smooth"})
el.style.border="2px solid orange"
}
},300)

toggleNotifications()
}

function toggleNotifications(){
document.getElementById("panel").classList.toggle("open")
}

// 👉 CLICK OUTSIDE CLOSE
document.addEventListener("click",function(e){
const panel=document.getElementById("panel")
const bell=document.querySelector(".bell")

if(!panel.contains(e.target) && !bell.contains(e.target)){
panel.classList.remove("open")
}
})

function renderOrders(){
const wrap=document.getElementById("page-orders")

wrap.innerHTML=state.orders.map(o=>`
<div id="order-${o.id}" style="background:white;margin:10px;padding:10px;border-radius:10px">
<b>${o.title}</b><br>
${o.city}
</div>
`).join("")
}

async function createNotification(recipient,title,body,orderId){
await client.from("notifications").insert([{
recipient_name:recipient,
title,
body,
order_id:orderId,
is_read:false
}])
}

// TEST BUTTON (kannst später löschen)
async function test(){
await createNotification(
localStorage.getItem("chatName"),
"Neuer Interessent",
"Testfirma hat Interesse gezeigt",
"1"
)
loadNotifications()
}

// INIT
localStorage.setItem("chatName","Testfirma8")
loadOrders()
loadNotifications()

</script>

</body>
</html>
