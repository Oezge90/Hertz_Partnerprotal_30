<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Hertz-Partnerportal</title>

<style>
body {
  font-family: Arial;
  margin: 0;
  display: flex;
}

.sidebar {
  width: 260px;
  background: #f3f9ff;
  padding: 20px;
}

.content {
  flex: 1;
  padding: 30px;
}

.brand-logo {
  width: 180px;
  display: block;
  margin: auto;
  margin-bottom: 20px;
}

button {
  width: 100%;
  padding: 12px;
  margin-bottom: 10px;
  border: none;
  border-radius: 10px;
  cursor: pointer;
}

.active {
  background: blue;
  color: white;
}

.page {
  display: none;
}

.page.active {
  display: block;
}
</style>
</head>

<body>

<div class="sidebar">
  <img src="logo.png" class="brand-logo">

  <button onclick="showPage('dashboard')">Dashboard</button>
  <button onclick="showPage('orders')">Aufträge entdecken</button>
  <button onclick="showPage('profile')">Firmenprofil</button>
</div>

<div class="content">

  <div id="dashboard" class="page active">
    <h1>Hertz-Partnerportal</h1>
    <p>Partnernetzwerk & Auftragsvergabe</p>
  </div>

  <div id="orders" class="page">
    <h1>Aufträge entdecken</h1>
  </div>

  <div id="profile" class="page">
    <h1>Firmenprofil</h1>
  </div>

</div>

<script>
function showPage(pageId) {
  const pages = document.querySelectorAll(".page");
  pages.forEach(p => p.classList.remove("active"));

  const target = document.getElementById(pageId);
  if (target) {
    target.classList.add("active");
  }
}
</script>

</body>
</html>
